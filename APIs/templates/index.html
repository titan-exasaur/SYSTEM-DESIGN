<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML Predictor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e8e8e4;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      font-size: 15px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafaf8;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      margin-bottom: 12px;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    input[type="number"]:focus {
      border-color: #534ab7;
      box-shadow: 0 0 0 3px #eeedfe;
      background: #fff;
    }

    button {
      width: 100%;
      height: 46px;
      background: #534ab7;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #3c3489; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #aaa; cursor: not-allowed; }

    .divider {
      height: 1px;
      background: #f0f0ec;
      margin: 1.8rem 0;
    }

    .result {
      display: none;
      background: #fafaf8;
      border: 1px solid #e8e8e4;
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      align-items: center;
      justify-content: space-between;
    }

    .result.visible {
      display: flex;
    }

    .result-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .result-value {
      font-size: 32px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .result-meta {
      text-align: right;
      font-size: 12px;
      color: #aaa;
    }

    .badge {
      display: inline-block;
      background: #eeedfe;
      color: #534ab7;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 99px;
      margin-top: 5px;
    }

    .error {
      font-size: 13px;
      color: #c0392b;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Predict</h1>
    <p class="sub">Linear regression model</p>

    <label for="inp">Input value</label>
    <input type="number" id="inp" placeholder="Enter an integer" required />
    <button id="btn" onclick="runPredict()">Run →</button>

    <div class="error" id="err"></div>

    <div class="divider"></div>

    <div class="result" id="result">
      <div>
        <div class="result-label">Prediction</div>
        <div class="result-value" id="result-value"></div>
      </div>
      <div class="result-meta">
        <span id="result-input-echo"></span>
        <br>
        <span class="badge">output = input + 1</span>
      </div>
    </div>

  </div>

  <script>
    async function runPredict() {
      const inp = document.getElementById('inp');
      const err = document.getElementById('err');
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      const resultValue = document.getElementById('result-value');
      const echo = document.getElementById('result-input-echo');

      // validate
      const raw = inp.value.trim();
      if (raw === '' || !Number.isInteger(Number(raw))) {
        err.textContent = 'Please enter a valid integer.';
        return;
      }
      err.textContent = '';
      const x = parseInt(raw, 10);

      // loading state
      btn.disabled = true;
      btn.textContent = 'Running...';
      result.classList.remove('visible');

      try {
        const res = await fetch('/api/v1/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: x })        // matches RegressionInput.x in FastAPI
        });

        if (!res.ok) {
          const data = await res.json();
          err.textContent = data.error || 'Something went wrong.';
          return;
        }

        const data = await res.json();
        resultValue.textContent = data.prediction;
        echo.textContent = 'Input: ' + data.input;
        result.classList.add('visible');

      } catch (e) {
        err.textContent = 'Could not reach the server.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Run →';
      }
    }

    document.getElementById('inp').addEventListener('keydown', e => {
      if (e.key === 'Enter') runPredict();
    });
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML Predictor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e8e8e4;
      border-radius: 16px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      font-size: 15px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafaf8;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      margin-bottom: 12px;
      -moz-appearance: textfield;
    }

    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    input[type="number"]:focus {
      border-color: #534ab7;
      box-shadow: 0 0 0 3px #eeedfe;
      background: #fff;
    }

    button {
      width: 100%;
      height: 46px;
      background: #534ab7;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #3c3489; }
    button:active { transform: scale(0.98); }

    .divider {
      height: 1px;
      background: #f0f0ec;
      margin: 1.8rem 0;
    }

    .result {
      background: #fafaf8;
      border: 1px solid #e8e8e4;
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .result-value {
      font-size: 32px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .result-meta {
      text-align: right;
      font-size: 12px;
      color: #aaa;
    }

    .badge {
      display: inline-block;
      background: #eeedfe;
      color: #534ab7;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 99px;
      margin-top: 5px;
    }

    .error {
      font-size: 13px;
      color: #c0392b;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Predict</h1>
    <p class="sub">Linear regression model</p>

    <form method="POST" action="/predict">
      <label for="inp">Input value</label>
      <input type="number" id="inp" name="input" placeholder="Enter an integer" required />
      <button type="submit">Run →</button>
    </form>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    {% if prediction is not none %}
      <div class="divider"></div>
      <div class="result">
        <div>
          <div class="result-label">Prediction</div>
          <div class="result-value">{{ prediction }}</div>
        </div>
        <div class="result-meta">
          Input: {{ input_val }}
          <br>
          <span class="badge">output = input + 1</span>
        </div>
      </div>
    {% endif %}

  </div>

</body>
</html>
